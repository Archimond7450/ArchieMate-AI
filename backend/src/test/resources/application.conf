# Test configuration
pekko {
  test.single-expect-default = 10s
  http {
    host-connection-pool.client.connect-timeout = 1s
  }
  persistence.journal.plugin = "pekko.persistence.journal.inmem"
  persistence.snapshot-store.plugin = "pekko.persistence.snapshot-store.inmem"
  
  persistence {
    journal {
      pekko-persistence-jdbc = ${?PEKKO_JOURNAL_PLUGIN}
      inmem {
        class = "org.apache.pekko.persistence.jpmc.inmem.InMemWriteJournalPlugin"
        plugin-dispatcher = "pekko.actor.default-dispatcher"
      }
    }
    snapshot-store {
      pekko-persistence-jdbc = ${?PEKKO_SNAPSHOT_PLUGIN}
      inmem {
        class = "org.apache.pekko.persistence.jpmc.inmem.InMemSnapshotStorePlugin"
        plugin-dispatcher = "pekko.actor.default-dispatcher"
      }
    }
  }
}

# Pekko serialization for UserTokenActor
pekko {
  serializers {
    user-token-actor = "com.archimond7450.archiemate.user.UserTokenActor$EventSerializer"
  }
  serialization-bindings {
    "com.archimond7450.archiemate.user.UserTokenActor$Event" = user-token-actor
  }
}
