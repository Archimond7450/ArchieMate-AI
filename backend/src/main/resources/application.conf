# ArchieMate Configuration
# Environment variables:
#   SERVER_HOST     - HTTP listen address (default: 0.0.0.0)
#   SERVER_PORT     - HTTP listen port (default: 8080)
#   DATABASE_URL    - PostgreSQL connection URL
#   DATABASE_USER   - PostgreSQL username
#   DATABASE_PASSWORD - PostgreSQL password

archiemate {
  server {
    host = "${?SERVER_HOST}"
    port = ${?SERVER_PORT}
    api-version = "v1"
  }

  database {
    url = "${?DATABASE_URL}"
    user = "${?DATABASE_USER}"
    password = "${?DATABASE_PASSWORD}"
    driver = "org.postgresql.Driver"

    # Pekko Persistence JDBC settings
    pekko-persistence-jdbc {
      journal {
        table = "pekko_journal"
        schema = "public"
        tag-table = "pekko_tags"
      }
      snapshot-store {
        table = "pekko_snapshots"
        schema = "public"
      }
      state-table {
        table = "pekko_state"
        schema = "public"
      }
    }
  }
}

# Pekko settings
pekko {
  actor {
    provider = "local"
  }

  http {
    server {
      preview-server-module-name = ""
    }
  }
}

# Logging
loglevel = "INFO"
