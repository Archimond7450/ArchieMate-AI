# ArchieMate Configuration
# Environment variables:
#   SERVER_HOST     - HTTP listen address (default: 0.0.0.0)
#   SERVER_PORT     - HTTP listen port (default: 8080)
#   DATABASE_URL    - PostgreSQL connection URL
#   DATABASE_USER   - PostgreSQL username
#   DATABASE_PASSWORD - PostgreSQL password

archiemate {
  server {
    host = "${?SERVER_HOST}"
    port = ${?SERVER_PORT}
    api-version = "v1"
  }

  jwt {
    secret = "${?JWT_SECRET}"
    token-lifetime-minutes = ${?JWT_TOKEN_LIFETIME_MINUTES}
  }

  twitch {
    client-id = "${?TWITCH_CLIENT_ID}"
    client-secret = "${?TWITCH_CLIENT_SECRET}"
    redirect-uri-postfix = "${?TWITCH_REDIRECT_URI_POSTFIX}"
  }

  database {
    url = "${?DATABASE_URL}"
    user = "${?DATABASE_USER}"
    password = "${?DATABASE_PASSWORD}"
    driver = "org.postgresql.Driver"
  }
}

# Pekko Persistence JDBC configuration
pekko-persistence-jdbc {
  shared-databases {
    slick {
      profile = "slick.jdbc.PostgresProfile$"
      db {
        url = "${?DATABASE_URL}"
        user = "${?DATABASE_USER}"
        password = "${?DATABASE_PASSWORD}"
        driver = "org.postgresql.Driver"
        numThreads = 5
        maxConnections = 5
        minConnections = 1
      }
    }
  }
}

jdbc-journal {
  use-shared-db = "slick"
  auto-start-journals = ["jdbc-journal"]
}

jdbc-snapshot-store {
  use-shared-db = "slick"
  auto-start-snapshot-stores = ["jdbc-snapshot-store"]
}

jdbc-durable-state-store {
  use-shared-db = "slick"
}

# Pekko core configuration
pekko {
  loglevel = "INFO"
  loglevel = ${?LOG_LEVEL}

  persistence {
    journal {
      plugin = "jdbc-journal"
    }

    snapshot-store {
      plugin = "jdbc-snapshot-store"
    }

    state {
      plugin = "jdbc-durable-state-store"
    }
  }

  actor {
    serializers {
      user-token-actor = "com.archimond7450.archiemate.user.UserTokenActorEventSerializer"
    }

    serialization-bindings {
      "com.archimond7450.archiemate.user.UserTokenEvent" = user-token-actor
    }
  }
}
