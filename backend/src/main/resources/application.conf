# ArchieMate Configuration
# Environment variables:
#   SERVER_HOST     - HTTP listen address (default: 0.0.0.0)
#   SERVER_PORT     - HTTP listen port (default: 8080)
#   DATABASE_URL    - PostgreSQL connection URL
#   DATABASE_USER   - PostgreSQL username
#   DATABASE_PASSWORD - PostgreSQL password
#   ASK_TIMEOUT     - Default Pekko ask timeout (default: 5s, e.g. '3s', '10m', '1h')
#   ADMIN_USER_ID   - Twitch user ID authorized for admin access (empty = no admin)

archiemate {
  # Base URL for all OAuth callback URLs (e.g. http://localhost or https://archiemate.com)
  callback-base-url = "${?CALLBACK_BASE_URL}"

  # Twitch user ID authorized for admin access (empty = no admin)
  admin-user-id = "${?ADMIN_USER_ID}"

  # Default timeout for Pekko ask operations (used by all actors)
  ask-timeout = "${?ASK_TIMEOUT:5s}"

  server {
    host = "${?SERVER_HOST}"
    port = ${?SERVER_PORT}
    api-version = "v1"
  }

  jwt {
    secret = "${?JWT_SECRET}"
    token-lifetime-minutes = ${?JWT_TOKEN_LIFETIME_MINUTES}
  }

  twitch {
    client-id = "${?TWITCH_CLIENT_ID}"
    client-secret = "${?TWITCH_CLIENT_SECRET}"
    callback-path = "${?TWITCH_CALLBACK_PATH}"
    scopes = ["chat:read", "chat:edit", "user:read:email"]
  }

  kick {
    client-id = "${?KICK_CLIENT_ID}"
    client-secret = "${?KICK_CLIENT_SECRET}"
    callback-path = "${?KICK_CALLBACK_PATH}"
  }

  youtube {
    client-id = "${?YOUTUBE_CLIENT_ID}"
    client-secret = "${?YOUTUBE_CLIENT_SECRET}"
    callback-path = "${?YOUTUBE_CALLBACK_PATH}"
  }

  http-client {
    max-connections = 10
    max-idle-timeout = 60s
  }

  database {
    url = "${?DATABASE_URL}"
    user = "${?DATABASE_USER}"
    password = "${?DATABASE_PASSWORD}"
    driver = "org.postgresql.Driver"
  }
}

# Pekko Persistence JDBC configuration
pekko-persistence-jdbc {
  shared-databases {
    slick {
      profile = "slick.jdbc.PostgresProfile$"
      db {
        url = "${?DATABASE_URL}"
        user = "${?DATABASE_USER}"
        password = "${?DATABASE_PASSWORD}"
        driver = "org.postgresql.Driver"
        numThreads = 5
        maxConnections = 5
        minConnections = 1
      }
    }
  }
}

jdbc-journal {
  use-shared-db = "slick"
  auto-start-journals = ["jdbc-journal"]
}

jdbc-snapshot-store {
  use-shared-db = "slick"
  auto-start-snapshot-stores = ["jdbc-snapshot-store"]
}

jdbc-durable-state-store {
  use-shared-db = "slick"
}

# Pekko core configuration
pekko {
  loglevel = "INFO"
  loglevel = ${?LOG_LEVEL}

  persistence {
    journal {
      plugin = "jdbc-journal"
    }

    snapshot-store {
      plugin = "jdbc-snapshot-store"
    }

    state {
      plugin = "jdbc-durable-state-store"
    }
  }

  actor {
    serializers {
      user-token-actor = "com.archimond7450.archiemate.user.UserTokenActorEventSerializer"
    }

    serialization-bindings {
      "com.archimond7450.archiemate.user.UserTokenEvent" = user-token-actor
    }
  }
}
